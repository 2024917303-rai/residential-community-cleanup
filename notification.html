<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notification Center – Clean-Up System</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --green-dark:  #1a5c2a;
      --green-mid:   #2e8b3f;
      --green-light: #4caf50;
      --yellow:      #f5c800;
      --navy:        #0d2340;
      --white:       #ffffff;
      --bg:          #f0f4f1;
      --sidebar-bg:  #0d2340;
      --text-main:   #1a2e1c;
      --text-muted:  #5a7260;
      --border:      #d0ddd2;
      --row-hover:   #e8f5e9;
      --red:         #c0392b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      display: flex;
      min-height: 100vh;
    }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--sidebar-bg);
      display: flex; flex-direction: column;
      padding: 28px 0 24px;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    }
    .sidebar-logo { display: flex; justify-content: center; padding: 0 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .sidebar-logo img { width: 120px; height: 120px; object-fit: contain; }
    .sidebar-logo .logo-placeholder { width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); font-size: 12px; }
    .sidebar-nav { flex: 1; padding: 20px 16px; display: flex; flex-direction: column; gap: 6px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-radius: 10px; color: rgba(255,255,255,0.6); font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; transition: background 0.15s, color 0.15s; border: none; background: none; width: 100%; text-align: left; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: var(--green-mid); color: #fff; }
    .nav-item.active svg { color: var(--yellow); }
    .sidebar-bottom { padding: 16px 16px 0; border-top: 1px solid rgba(255,255,255,0.08); }
    .btn-logout { display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 16px; border-radius: 10px; background: rgba(192,57,43,0.2); color: #ff8a80; border: none; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; transition: background 0.15s; }
    .btn-logout:hover { background: rgba(192,57,43,0.4); }
    .btn-logout svg { width: 18px; height: 18px; }

    /* ══ MAIN ══ */
    .main {
      margin-left: 240px; flex: 1;
      display: flex; flex-direction: column;
      height: 100vh; /* full viewport */
      overflow: hidden;
    }

    .topbar {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 16px 32px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0; z-index: 50;
    }
    .topbar-left h1 { font-size: 20px; font-weight: 700; color: var(--text-main); }
    .topbar-left p  { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .admin-badge { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 6px 14px 6px 8px; }
    .admin-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--green-mid); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; }
    .admin-badge span { font-size: 13px; font-weight: 600; color: var(--text-main); }

    /* Content fills remaining height */
    .content {
      flex: 1;
      padding: 24px 32px;
      overflow: hidden; /* children handle their own scroll */
      display: flex;
      flex-direction: column;
    }

    /* Two column grid — fills full height */
    .page-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
      flex: 1;
      min-height: 0; /* crucial: allow children to shrink */
    }

    /* ══ COMPOSE CARD ══ */
    .compose-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      display: flex; flex-direction: column;
      min-height: 0;
    }

    .compose-scroll {
      flex: 1; overflow-y: auto;
    }

    .card-head {
      padding: 20px 24px;
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .card-head svg { width: 20px; height: 20px; color: var(--yellow); }
    .card-head h2 { font-size: 16px; font-weight: 700; color: #fff; }
    .card-head p  { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; }

    .card-body { padding: 24px; display: flex; flex-direction: column; gap: 18px; }

    .field-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 7px; }

    .field-select-wrap { position: relative; }
    .field-select-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--green-mid); pointer-events: none; }

    .field-select {
      width: 100%; padding: 11px 14px 11px 40px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; font-family: inherit; outline: none;
      background: #fafafa; color: var(--text-main); transition: border-color 0.2s;
    }
    .field-select:focus { border-color: var(--green-light); background: #fff; }

    .field-input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; font-family: inherit; outline: none;
      background: #fafafa; color: var(--text-main); transition: border-color 0.2s;
    }
    .field-input:focus { border-color: var(--green-light); background: #fff; }

    .field-textarea {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; font-family: inherit; outline: none;
      background: #fafafa; color: var(--text-main);
      resize: vertical; min-height: 130px; line-height: 1.6;
      transition: border-color 0.2s;
    }
    .field-textarea:focus { border-color: var(--green-light); background: #fff; }

    .char-count { text-align: right; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .char-count.warn { color: #e67e22; }
    .char-count.over { color: var(--red); }

    /* Target options */
    .target-group { display: flex; flex-direction: column; gap: 10px; }

    .target-option {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 16px; border-radius: 10px;
      border: 1.5px solid var(--border); cursor: pointer;
      transition: border-color 0.15s, background 0.15s; background: #fafafa;
    }
    .target-option:hover { border-color: var(--green-light); background: #f0faf1; }
    .target-option.selected { border-color: var(--green-mid); background: #e8f5e9; }
    .target-option input[type="checkbox"] { display: none; }

    .custom-check {
      width: 20px; height: 20px; border-radius: 6px;
      border: 2px solid var(--border); background: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
    }
    .target-option.selected .custom-check { background: var(--green-mid); border-color: var(--green-mid); }
    .custom-check svg { width: 12px; height: 12px; color: #fff; display: none; }
    .target-option.selected .custom-check svg { display: block; }

    .target-info strong { font-size: 14px; font-weight: 600; color: var(--text-main); display: block; }
    .target-info span   { font-size: 12px; color: var(--text-muted); }

    .target-icon { margin-left: auto; width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .target-icon.all    { background: #e3f2fd; color: #1976d2; }
    .target-icon.attend { background: #e8f5e9; color: var(--green-dark); }
    .target-icon svg { width: 18px; height: 18px; }

    .btn-send {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 10px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-send:hover   { opacity: 0.9; }
    .btn-send:active  { transform: scale(0.98); }
    .btn-send svg { width: 18px; height: 18px; }
    .btn-send:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ══ HISTORY CARD — scrollable ══ */
    .history-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      display: flex; flex-direction: column;
      min-height: 0; /* allow shrink */
    }

    .history-head {
      padding: 16px 20px;
      background: linear-gradient(135deg, var(--navy), #1a3a60);
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .history-head svg { width: 18px; height: 18px; color: var(--yellow); }
    .history-head h3  { font-size: 14px; font-weight: 700; color: #fff; flex: 1; }
    .history-count    { background: rgba(255,255,255,0.18); border-radius: 999px; padding: 2px 10px; font-size: 12px; color: #fff; font-weight: 600; }

    /* THIS is the scrollable area */
    .history-list {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      /* custom scrollbar */
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .history-list::-webkit-scrollbar { width: 5px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
    .history-list::-webkit-scrollbar-thumb:hover { background: #b0c4b8; }

    .notif-item {
      padding: 14px 18px; border-bottom: 1px solid #eef2ee;
      transition: background 0.12s;
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-item:hover { background: var(--row-hover); }

    .notif-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
    .notif-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .notif-dot.all    { background: #1976d2; }
    .notif-dot.attend { background: var(--green-mid); }

    .notif-title { font-size: 13.5px; font-weight: 600; color: var(--text-main); flex: 1; line-height: 1.3; }

    .notif-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
    .badge-all    { background: #e3f2fd; color: #1565c0; }
    .badge-attend { background: #e8f5e9; color: var(--green-dark); }

    .notif-msg  { font-size: 12px; color: var(--text-muted); padding-left: 18px; line-height: 1.5; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .notif-meta { padding-left: 18px; font-size: 11px; color: #aaa; display: flex; gap: 10px; flex-wrap: wrap; }

    .history-empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .history-empty svg { width: 40px; height: 40px; opacity: 0.2; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
    .history-empty p { font-size: 13px; }

    /* TOAST */
    .toast { position: fixed; bottom: 28px; right: 28px; background: var(--navy); color: #fff; padding: 13px 20px; border-radius: 10px; font-size: 13.5px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.25); display: flex; align-items: center; gap: 10px; z-index: 300; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast svg  { width: 18px; height: 18px; color: var(--yellow); }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="asset/logo.png" alt="Logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="logo-placeholder" style="display:none">Logo</div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="event_management.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Event List

    <a class="nav-item" href="list_tools.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      Tools
    </a>
    <a class="nav-item active" href="notification.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Notification Center
    </a>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </a>
  </nav>
  <div class="sidebar-bottom">
    <button class="btn-logout" onclick="window.location.href='login.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Log Out
    </button>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Notification</h1>
      <p>Residential Community Clean-Up Announcement System</p>
    </div>
    <div class="admin-badge">
      <div class="admin-avatar">A</div>
      <span>Admin</span>
    </div>
  </div>

  <div class="content">
    <div class="page-grid">

      <!-- LEFT: Compose (scrollable internally) -->
      <div class="compose-card">
        <div class="card-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <div>
            <h2>Send Notification</h2>
            <p>Compose and send announcements to residents</p>
          </div>
        </div>
        <div class="compose-scroll">
          <div class="card-body">

            <!-- Event -->
            <div>
              <label class="field-label">Related Event (optional)</label>
              <div class="field-select-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <select class="field-select" id="nEvent">
                  <option value="">— No specific event —</option>
                  <option value="1">Taman Maju Block A Clean-Up (5 Jul 2026)</option>
                  <option value="2">Jalan Kenanga Gotong-Royong (12 Jul 2026)</option>
                  <option value="3">Taman Indah Recycling Drive (1 Jul 2026)</option>
                  <option value="4">Lorong Damai Park Restoration (20 Jul 2026)</option>
                  <option value="5">Taman Sejahtera Q2 Clean-Up (15 Jun 2026)</option>
                </select>
              </div>
            </div>

            <!-- Title -->
            <div>
              <label class="field-label">Title *</label>
              <input type="text" class="field-input" id="nTitle" placeholder="e.g. Reminder: Clean-Up Tomorrow at 8AM" maxlength="100">
            </div>

            <!-- Message -->
            <div>
              <label class="field-label">Message *</label>
              <textarea class="field-textarea" id="nMessage" placeholder="Write your announcement here…" maxlength="500"></textarea>
              <div class="char-count" id="charCount">0 / 500</div>
            </div>

            <!-- Target -->
            <div>
              <label class="field-label">Send To *</label>
              <div class="target-group">
                <label class="target-option" id="optAll">
                  <input type="checkbox" id="chkAll">
                  <div class="custom-check">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                  <div class="target-info">
                    <strong>Send to all residents</strong>
                    <span>Broadcast to everyone in the system</span>
                  </div>
                  <div class="target-icon all">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                  </div>
                </label>
                <label class="target-option" id="optAttend">
                  <input type="checkbox" id="chkAttend">
                  <div class="custom-check">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                  <div class="target-info">
                    <strong>Send to those who "Attend"</strong>
                    <span>Only participants who confirmed attendance</span>
                  </div>
                  <div class="target-icon attend">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                </label>
              </div>
            </div>

            <!-- Send button -->
            <button class="btn-send" id="btnSend" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Send Notification
            </button>

          </div>
        </div>
      </div>

      <!-- RIGHT: History (scrollable) -->
      <div class="history-card">
        <div class="history-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <h3>Sent History</h3>
          <span class="history-count" id="historyCount">0</span>
        </div>

        <!-- Scrollable list -->
        <div class="history-list" id="historyList"></div>
      </div>

    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastMsg">Notification sent!</span>
</div>

<script>
  let notifHistory = [
    { id:1, title:'Gotong-Royong This Sunday!', message:'Reminder to all residents that our monthly gotong-royong will be held this Sunday at 8AM. Please bring your own gloves and wear appropriate attire.', target:'all', event:'Taman Maju Block A Clean-Up', time:'28 Jun 2026, 10:32 AM' },
    { id:2, title:'Thank You for Attending!', message:'Thank you to all participants who joined the Taman Indah Recycling Drive. Your effort makes our community cleaner and greener!', target:'attend', event:'Taman Indah Recycling Drive', time:'2 Jul 2026, 3:15 PM' },
    { id:3, title:'Upcoming Event Reminder', message:'This is a reminder for the Lorong Damai Park Restoration event next week. Please check the event details for venue and time.', target:'all', event:'Lorong Damai Park Restoration', time:'14 Jul 2026, 9:00 AM' },
    { id:4, title:'Tools Collection Notice', message:'Please return all borrowed tools to the community hall by Friday 5PM. This helps us prepare for the next event.', target:'attend', event:'Taman Sejahtera Q2 Clean-Up', time:'16 Jun 2026, 11:00 AM' },
    { id:5, title:'New Event Announced!', message:'A new clean-up event has been scheduled for Jalan Kenanga area. Please register your attendance through the community portal.', target:'all', event:'', time:'20 Jun 2026, 8:45 AM' },
    { id:6, title:'Weather Update', message:'Due to forecasted heavy rain, the Taman Maju Block A Clean-Up has been rescheduled. New date will be announced shortly. Thank you for your understanding.', target:'all', event:'Taman Maju Block A Clean-Up', time:'4 Jul 2026, 7:00 AM' },
  ];

  let nextId = 7;

  function fmtNow() {
    const d = new Date();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const h = d.getHours(), m = d.getMinutes();
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}, ${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    document.getElementById('historyCount').textContent = notifHistory.length;

    if (notifHistory.length === 0) {
      list.innerHTML = `
        <div class="history-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <p>No notifications sent yet.</p>
        </div>`;
      return;
    }

    list.innerHTML = [...notifHistory].reverse().map(n => `
      <div class="notif-item">
        <div class="notif-top">
          <div class="notif-dot ${n.target}"></div>
          <div class="notif-title">${n.title}</div>
          <span class="notif-badge ${n.target === 'all' ? 'badge-all' : 'badge-attend'}">
            ${n.target === 'all' ? 'All Residents' : 'Attended Only'}
          </span>
        </div>
        <div class="notif-msg">${n.message}</div>
        <div class="notif-meta">
          <span>🕐 ${n.time}</span>
          ${n.event ? `<span>📅 ${n.event}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  // Checkbox toggle
  ['All','Attend'].forEach(type => {
    const opt = document.getElementById(`opt${type}`);
    const chk = document.getElementById(`chk${type}`);
    opt.addEventListener('click', () => {
      chk.checked = !chk.checked;
      opt.classList.toggle('selected', chk.checked);
      validateForm();
    });
  });

  // Char count
  document.getElementById('nMessage').addEventListener('input', function() {
    const len = this.value.length;
    const el  = document.getElementById('charCount');
    el.textContent = `${len} / 500`;
    el.className = 'char-count' + (len > 450 ? ' warn' : '') + (len >= 500 ? ' over' : '');
    validateForm();
  });

  document.getElementById('nTitle').addEventListener('input', validateForm);

  function validateForm() {
    const title  = document.getElementById('nTitle').value.trim();
    const msg    = document.getElementById('nMessage').value.trim();
    const anyChk = document.getElementById('chkAll').checked || document.getElementById('chkAttend').checked;
    document.getElementById('btnSend').disabled = !(title && msg && anyChk);
  }

  // Send
  document.getElementById('btnSend').addEventListener('click', () => {
    const title    = document.getElementById('nTitle').value.trim();
    const msg      = document.getElementById('nMessage').value.trim();
    const toAll    = document.getElementById('chkAll').checked;
    const toAttend = document.getElementById('chkAttend').checked;
    const eventSel = document.getElementById('nEvent');
    const eventTxt = eventSel.options[eventSel.selectedIndex].text;
    const target   = (toAll && toAttend) || toAll ? 'all' : 'attend';

    notifHistory.push({ id: nextId++, title, message: msg, target, event: eventSel.value ? eventTxt : '', time: fmtNow() });

    // Reset
    document.getElementById('nTitle').value   = '';
    document.getElementById('nMessage').value = '';
    document.getElementById('nEvent').value   = '';
    document.getElementById('charCount').textContent = '0 / 500';
    document.getElementById('charCount').className   = 'char-count';

    ['All','Attend'].forEach(t => {
      document.getElementById(`chk${t}`).checked = false;
      document.getElementById(`opt${t}`).classList.remove('selected');
    });

    document.getElementById('btnSend').disabled = true;
    renderHistory();

    // Scroll history to top so new item is visible
    document.getElementById('historyList').scrollTop = 0;

    showToast('Notification sent successfully!');
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  renderHistory();
</script>
</body>
</html>
