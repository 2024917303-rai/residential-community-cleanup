<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ✅ FIXED: background tak berulang */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('asset/login_bg.jpg');
      background-size: cover;       /* penuh skrin */
      background-position: center;  /* tengah */
      background-repeat: no-repeat; /* TIDAK berulang */
      z-index: 0;
    }

    /* ✅ FIXED: overlay ada saiz */
    .bg::after {
      content: '';
      position: absolute;
      background: linear-gradient(to right, rgba(10,10,10,0.75) 0%, rgba(10,10,10,0.25) 100%);
    }
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      width: min(900px, 95vw);
      min-height: 520px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    .panel-left {
      flex: 1;
      padding: 52px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      display: flex;
      justify-content: center;
    }

    .panel-left-body {
      padding: 20px 0;
    }

    .panel-left-body h1 {
      font-size: 32px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.25;
      margin-bottom: 14px;
    }

    .panel-left-body h1 span { color: #ffe851; }

    .panel-left-body p {
      font-size: 16px;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
      max-width: 280px;
    }

    .panel-left-footer {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }

    /* ✅ Right panel */
    .panel-right {
      width: 380px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.96);
      padding: 52px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-title {
      font-size: 26px;
      font-weight: 700;
      color: #111;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    /* ✅ FIXED: input-wrap ada position relative */
    .input-wrap {
      position: relative;
    }

    .input-wrap > svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: #aaa;
      pointer-events: none;
      z-index: 1;
    }

    .input-wrap input {
      width: 100%;
      padding: 12px 44px 12px 40px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #222;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .input-wrap input:focus {
      border-color: #ffe851;
      background: #fff;
    }

    /* ✅ FIXED: toggle button z-index tinggi supaya boleh tekan */
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: #aaa;
      display: flex;
      align-items: center;
      z-index: 10;
    }

    .toggle-pw:hover { color: #555; }
    .toggle-pw svg { width: 16px; height: 16px; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #ffe851;
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-login:hover { background: #f0d800; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login svg { width: 16px; height: 16px; }

    .error-msg {
      display: none;
      background: #fef0f0;
      border: 1px solid #fbc2c2;
      color: #c0392b;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .error-msg.show { display: block; }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #111;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .panel-left { display: none; }
      .panel-right { width: 100%; border-radius: 16px; }
      .wrapper { width: 92vw; }
    }
  </style>
</head>
<body>

<div class="bg"></div>

<div class="wrapper">
  <div class="panel-left">
    <div class="logo">
      <img src="asset/logo.png" width="250" height="250" alt="Logo">
    </div>

    <div class="panel-left-body">
      <h1>Manage your events <span>easily.</span></h1>
      <p>Manage every event, monitor every detail.</p>
    </div>

  </div>

  <div class="panel-right">
    <div class="form-title">Admin Login</div>

    <div class="error-msg" id="errorMsg">
      Invalid email or password. Try again.
    </div>

    <div class="form-group">
      <label for="username">Email</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="email" id="username" placeholder="Enter your email" autocomplete="username" />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
        <button class="toggle-pw" id="togglePw" type="button" aria-label="Show/hide password">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" type="button">
      <span id="btnText">Login</span>
      <div class="spinner" id="spinner"></div>
      <svg id="btnArrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://dlhqubrluorfszaqqugh.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsaHF1YnJsdW9yZnN6YXFxdWdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Nzg1ODksImV4cCI6MjA5NzI1NDU4OX0.zMLZyMwh7sZOJQIHWOC217yitvFDdd2_Fqegpm-l2Nw";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>
<script>
  const togglePw = document.getElementById('togglePw');
  const pwInput  = document.getElementById('password');
  const eyeIcon  = document.getElementById('eyeIcon');

  togglePw.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  const loginBtn = document.getElementById('loginBtn');
  const spinner  = document.getElementById('spinner');
  const btnText  = document.getElementById('btnText');
  const btnArrow = document.getElementById('btnArrow');
  const errorMsg = document.getElementById('errorMsg');

  loginBtn.addEventListener('click', async () => {
    const email = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    errorMsg.classList.remove('show');

    if (!email || !password) {
      errorMsg.textContent = 'Please fill in email and password.';
      errorMsg.classList.add('show');
      return;
    }

    btnText.textContent = 'Loading…';
    spinner.style.display = 'block';
    btnArrow.style.display = 'none';
    loginBtn.disabled = true;

    const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email, password });

    if (authError) {
      errorMsg.textContent = 'Invalid email or password. Try again.';
      errorMsg.classList.add('show');
      btnText.textContent = 'Login';
      spinner.style.display = 'none';
      btnArrow.style.display = 'block';
      loginBtn.disabled = false;
      return;
    }

    const { data: adminData, error: adminError } = await supabase
      .from('admin')
      .select('*')
      .eq('auth_uid', authData.user.id)
      .single();

    if (adminError || !adminData) {
      errorMsg.textContent = 'This account is not registered as an admin.';
      errorMsg.classList.add('show');
      btnText.textContent = 'Login';
      spinner.style.display = 'none';
      btnArrow.style.display = 'block';
      loginBtn.disabled = false;
      await supabase.auth.signOut();
    } else {
      sessionStorage.setItem('admin', JSON.stringify(adminData));
      btnText.textContent = 'Success!';
      spinner.style.display = 'none';
      loginBtn.style.background = '#27ae60';
      loginBtn.style.color = '#fff';
      setTimeout(() => { window.location.href = 'event_management.html'; }, 800);
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') loginBtn.click();
  });
</script>
</body>
</html>
